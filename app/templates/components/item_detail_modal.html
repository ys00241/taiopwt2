<!-- ═══ Item Detail Modal (shared by items.html, bidding.html, previous.html, member_detail.html) ═══ -->
<div class="modal-overlay" id="itemDetailModal">
  <div class="modal-content" style="max-width: 480px;">
    <div class="flex items-center justify-between mb-md">
      <div>
        <h2 class="font-headline-md" id="detailModalTitle" style="color: var(--on-surface);">聖物詳情</h2>
        <p class="font-body-sm text-on-surface-variant" id="detailModalSubtitle">—</p>
      </div>
      <button class="icon-btn" onclick="closeItemDetail()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Loading state -->
    <div id="detailLoading" class="flex items-center justify-center py-lg" style="color: var(--on-surface-variant);">
      <span class="material-symbols-outlined" style="font-size: 1.5rem; animation: spin 1s linear infinite;">sync</span>
      <span class="ml-sm font-body-md">載入中...</span>
    </div>

    <!-- Content (hidden until loaded) -->
    <div id="detailContent" style="display: none;">
      <div class="flex flex-col gap-md">

        <!-- Sticker + Name row -->
        <div class="flex items-center gap-md">
          <div id="detailStickerBadge" class="sticker-badge" style="width:52px;height:52px;font-size:1.125rem;">--</div>
          <div>
            <div id="detailItemName" class="font-headline-md" style="color: var(--on-surface);">—</div>
            <div id="detailActualItem" class="font-body-sm text-on-surface-variant">—</div>
          </div>
        </div>

        <hr style="border: none; border-top: 1px solid var(--outline-variant);">

        <!-- Basic info -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
          <div>
            <div class="font-label-md text-on-surface-variant mb-xs">類別</div>
            <div id="detailCategory" class="font-body-md">—</div>
          </div>
          <div>
            <div class="font-label-md text-on-surface-variant mb-xs">成本</div>
            <div id="detailCost" class="font-headline-sm" style="color: var(--on-surface);">$0</div>
          </div>
          <div class="sm:col-span-2">
            <div class="font-label-md text-on-surface-variant mb-xs">來源</div>
            <div id="detailSource" class="font-body-md">—</div>
          </div>
          <div class="sm:col-span-2" id="detailNotesRow" style="display: none;">
            <div class="font-label-md text-on-surface-variant mb-xs">備註</div>
            <div id="detailNotes" class="font-body-md" style="background: var(--surface-container); border-radius: 8px; padding: 0.75rem;">—</div>
          </div>
        </div>

        <hr style="border: none; border-top: 1px solid var(--outline-variant);">

        <!-- Bid info header -->
        <div class="font-label-md text-on-surface-variant">競投狀態</div>

        <!-- Won state -->
        <div id="detailWonSection" style="display: none;">
          <div class="flex items-center gap-xs mb-sm">
            <span class="chip chip-green">已競投</span>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
            <div>
              <div class="font-label-md text-on-surface-variant mb-xs">投得者</div>
              <div id="detailBidderName" class="font-body-md" style="font-weight: 600;">—</div>
            </div>
            <div>
              <div class="font-label-md text-on-surface-variant mb-xs">競投金額</div>
              <div id="detailBidAmount" class="font-headline-sm" style="color: var(--primary);">$0</div>
            </div>
            <div>
              <div class="font-label-md text-on-surface-variant mb-xs">已付金額</div>
              <div id="detailPaidAmount" class="font-body-md">$0</div>
            </div>
            <div>
              <div class="font-label-md text-on-surface-variant mb-xs">付款方式</div>
              <div id="detailPaymentMethod" class="font-body-md">—</div>
            </div>
          </div>
        </div>

        <!-- Not won state -->
        <div id="detailNotWonSection" style="display: none;">
          <div class="flex items-center gap-xs mb-sm">
            <span class="chip" style="background: var(--surface-variant); color: var(--on-surface-variant);">尚未競投</span>
          </div>
          <p class="font-body-md text-on-surface-variant">此聖物尚未被競投。</p>
        </div>

        <!-- ═══ Bid History (競投紀錄) ═══ -->
        <div id="detailBidHistorySection" style="display: none;">
          <hr style="border: none; border-top: 1px solid var(--outline-variant);">
          <div class="font-label-md text-on-surface-variant mb-sm">競投紀錄</div>
          <div id="detailBidHistoryContent" style="overflow-x: auto;">
            <!-- Dynamically populated table -->
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
/**
 * Open the item detail modal and fetch data from the API (ThisYearItem).
 * @param {number} itemId - The ThisYearItem ID to load.
 */
function openItemDetail(itemId) {
  var modal = document.getElementById('itemDetailModal');
  var loading = document.getElementById('detailLoading');
  var content = document.getElementById('detailContent');

  // Reset to loading state
  if (loading) loading.style.display = 'flex';
  if (content) content.style.display = 'none';

  // Hide bid history from previous open
  var bidHistSection = document.getElementById('detailBidHistorySection');
  if (bidHistSection) bidHistSection.style.display = 'none';

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  fetch('/api/item-detail/' + itemId)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (loading) loading.style.display = 'none';
      if (content) content.style.display = 'block';

      // Populate fields
      var stickerStr = data.sticker_no ? String(data.sticker_no).padStart(2, '0') : '--';
      document.getElementById('detailStickerBadge').textContent = stickerStr;
      document.getElementById('detailItemName').textContent = data.item_name || '—';
      document.getElementById('detailActualItem').textContent = data.actual_item || '—';
      document.getElementById('detailCategory').textContent = data.category || '—';
      document.getElementById('detailCost').textContent = '$' + (data.cost || 0).toLocaleString();
      document.getElementById('detailSource').textContent = data.source || '—';
      document.getElementById('detailModalTitle').textContent = '聖物 #' + stickerStr;
      document.getElementById('detailModalSubtitle').textContent = data.item_name || '';

      // Notes
      var notesRow = document.getElementById('detailNotesRow');
      var notesEl = document.getElementById('detailNotes');
      if (data.notes && data.notes.trim()) {
        notesRow.style.display = 'block';
        notesEl.textContent = data.notes;
      } else {
        notesRow.style.display = 'none';
      }

      // Bid status
      var wonSection = document.getElementById('detailWonSection');
      var notWonSection = document.getElementById('detailNotWonSection');

      if (data.is_won) {
        wonSection.style.display = 'block';
        notWonSection.style.display = 'none';
        document.getElementById('detailBidderName').textContent = data.bidder_name || '—';
        document.getElementById('detailBidAmount').textContent = '$' + (data.bid_amount || 0).toLocaleString();
        document.getElementById('detailPaidAmount').textContent = data.paid_amount > 0 ? '$' + data.paid_amount.toLocaleString() : '未付款';
        document.getElementById('detailPaymentMethod').textContent = data.payment_method || '—';
      } else {
        wonSection.style.display = 'none';
        notWonSection.style.display = 'block';
      }

      // If API returned bid history, show it
      if (data.bids && data.bids.length > 0 && bidHistSection) {
        renderBidHistory(data.bids);
        bidHistSection.style.display = 'block';
      }
    })
    .catch(function (err) {
      console.error('Item detail fetch error:', err);
      if (loading) loading.style.display = 'none';
      if (content) content.style.display = 'block';
      document.getElementById('detailItemName').textContent = '載入失敗';
      document.getElementById('detailModalSubtitle').textContent = '無法獲取聖物詳情';
    });
}

/**
 * Open item detail modal using Item model (by item_id integer).
 * Fetches from /api/items/<int:item_id>/detail which includes bid records.
 * @param {number} itemId - The Item.item_id to load.
 */
function openItemDetailFromDb(itemId) {
  var modal = document.getElementById('itemDetailModal');
  var loading = document.getElementById('detailLoading');
  var content = document.getElementById('detailContent');

  if (loading) loading.style.display = 'flex';
  if (content) content.style.display = 'none';

  var bidHistSection = document.getElementById('detailBidHistorySection');
  if (bidHistSection) bidHistSection.style.display = 'none';

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  fetch('/api/items/' + itemId + '/detail')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (loading) loading.style.display = 'none';
      if (content) content.style.display = 'block';

      var stickerStr = data.sticker_no ? String(data.sticker_no).padStart(2, '0') : '--';
      document.getElementById('detailStickerBadge').textContent = stickerStr;
      document.getElementById('detailItemName').textContent = data.item_name || '—';
      document.getElementById('detailActualItem').textContent = data.actual_item || '—';
      document.getElementById('detailCategory').textContent = data.category || '—';
      document.getElementById('detailCost').textContent = '$' + (data.cost || 0).toLocaleString();
      document.getElementById('detailSource').textContent = data.source || '—';
      document.getElementById('detailModalTitle').textContent = '聖物 #' + stickerStr;
      document.getElementById('detailModalSubtitle').textContent = data.item_name || '';

      var notesRow = document.getElementById('detailNotesRow');
      var notesEl = document.getElementById('detailNotes');
      if (data.notes && data.notes.trim()) {
        notesRow.style.display = 'block';
        notesEl.textContent = data.notes;
      } else {
        notesRow.style.display = 'none';
      }

      var wonSection = document.getElementById('detailWonSection');
      var notWonSection = document.getElementById('detailNotWonSection');

      if (data.is_won) {
        wonSection.style.display = 'block';
        notWonSection.style.display = 'none';
        document.getElementById('detailBidderName').textContent = data.bidder_name || '—';
        document.getElementById('detailBidAmount').textContent = '$' + (data.bid_amount || 0).toLocaleString();
        document.getElementById('detailPaidAmount').textContent = data.paid_amount > 0 ? '$' + data.paid_amount.toLocaleString() : '未付款';
        document.getElementById('detailPaymentMethod').textContent = data.payment_method || '—';
      } else {
        wonSection.style.display = 'none';
        notWonSection.style.display = 'block';
      }

      // Show bid history if available
      if (data.bids && data.bids.length > 0 && bidHistSection) {
        renderBidHistory(data.bids);
        bidHistSection.style.display = 'block';
      }
    })
    .catch(function (err) {
      console.error('Item detail fetch error:', err);
      if (loading) loading.style.display = 'none';
      if (content) content.style.display = 'block';
      document.getElementById('detailItemName').textContent = '載入失敗';
      document.getElementById('detailModalSubtitle').textContent = '無法獲取聖物詳情';
    });
}

/**
 * Render the bid history table into the modal.
 * @param {Array} bids - Array of bid objects {year, member_name, bid_amount, paid_amount, unpaid}
 */
function renderBidHistory(bids) {
  var histContent = document.getElementById('detailBidHistoryContent');
  if (!histContent || !bids || bids.length === 0) return;

  var tableHtml = '<table class="imperial-table" style="font-size:0.8125rem;"><thead><tr>' +
    '<th>年份</th><th>競投者</th><th style="text-align:right;">金額</th>' +
    '<th style="text-align:right;">已付</th><th style="text-align:right;">欠款</th>' +
    '</tr></thead><tbody>';

  bids.forEach(function(b) {
    var unpaid = (b.bid_amount || 0) - (b.paid_amount || 0);
    tableHtml += '<tr>' +
      '<td><span class="chip chip-gold">' + b.year + '</span></td>' +
      '<td>' + (b.member_name || '—') + '</td>' +
      '<td style="text-align:right;">$' + (b.bid_amount || 0).toLocaleString() + '</td>' +
      '<td style="text-align:right;">' + (b.paid_amount > 0 ? '$' + b.paid_amount.toLocaleString() : '—') + '</td>' +
      '<td style="text-align:right;">' + (unpaid > 0 ? '<span style="color:var(--tertiary);font-weight:600;">$' + unpaid.toLocaleString() + '</span>' : '$0') + '</td>' +
      '</tr>';
  });

  tableHtml += '</tbody></table>';
  histContent.innerHTML = tableHtml;
}

function closeItemDetail() {
  var modal = document.getElementById('itemDetailModal');
  modal.classList.remove('open');
  document.body.style.overflow = '';
}

// ── Close on overlay click ──
document.addEventListener('DOMContentLoaded', function () {
  var m = document.getElementById('itemDetailModal');
  if (m) {
    m.addEventListener('click', function (e) {
      if (e.target === this) closeItemDetail();
    });
  }
});
</script>

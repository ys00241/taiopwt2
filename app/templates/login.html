<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 — 寶榮堂花炮會管理系統</title>

  <!-- Google Fonts: Outfit + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,200" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --primary: #795900;
      --primary-container: #D4A843;
      --on-primary: #ffffff;
      --on-primary-container: #553e00;
      --surface: #fff8f2;
      --surface-container: #f6ede1;
      --on-surface: #1f1b14;
      --on-surface-variant: #4e4636;
      --outline-variant: #d2c5b1;
      --tertiary: #b52424;
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2D2822;
      position: relative;
      overflow: hidden;
      padding: 1.5rem;
    }

    /* ── Decorative cloud/pattern motifs ── */
    .login-wrapper::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212,168,67,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .login-wrapper::after {
      content: '';
      position: absolute;
      bottom: -20%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(212,168,67,0.05) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: #352F28;
      border: 1px solid rgba(212,168,67,0.2);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    /* ── Branding ── */
    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-brand-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 1rem;
      background: var(--primary-container);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-brand-icon .material-symbols-outlined {
      font-size: 36px;
      color: var(--on-primary-container);
    }
    .login-brand h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--primary-container);
      margin: 0 0 0.25rem;
      letter-spacing: -0.02em;
    }
    .login-brand p {
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.5);
      margin: 0;
    }

    /* ── Form ── */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }
    .form-group label {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.6);
    }
    .form-group .input-wrapper {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-group .input-wrapper:focus-within {
      border-color: var(--primary-container);
      background: rgba(255,255,255,0.08);
    }
    .form-group .input-wrapper .material-symbols-outlined {
      font-size: 1.25rem;
      color: rgba(255,255,255,0.35);
    }
    .form-group .input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.9375rem;
      color: #ffffff;
    }
    .form-group .input-wrapper input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    /* ── Remember me ── */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }
    .checkbox-wrapper input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-container);
      border-radius: 4px;
      cursor: pointer;
    }
    .checkbox-wrapper span {
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.5);
    }
    .forgot-link {
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      color: var(--primary-container);
      text-decoration: none;
    }
    .forgot-link:hover {
      text-decoration: underline;
    }

    /* ── Submit ── */
    .btn-login {
      width: 100%;
      padding: 0.875rem;
      border: none;
      border-radius: 12px;
      background: var(--primary-container);
      color: var(--on-primary-container);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-login:hover {
      opacity: 0.92;
    }
    .btn-login:active {
      transform: scale(0.98);
    }
    .btn-login .material-symbols-outlined {
      font-size: 1.25rem;
    }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
    }

    /* ── Flash messages ── */
    .flash-message {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8125rem;
      margin-bottom: 1rem;
    }
    .flash-error {
      background: rgba(181,36,36,0.15);
      color: #fca5a5;
      border: 1px solid rgba(181,36,36,0.3);
    }
    .flash-info {
      background: rgba(212,168,67,0.15);
      color: var(--primary-container);
      border: 1px solid rgba(212,168,67,0.3);
    }

    /* ── Decorative lines ── */
    .decorative-line {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.5rem 0;
    }
    .decorative-line::before,
    .decorative-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,67,0.3), transparent);
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-card { padding: 2rem 1.5rem; }
      .login-brand h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">

    <div class="login-card">
      <!-- Brand -->
      <div class="login-brand">
        <div class="login-brand-icon">
          <span class="material-symbols-outlined">temple_buddhist</span>
        </div>
        <h1>寶榮堂花炮會</h1>
        <p>管理系統</p>
        <div class="decorative-line"></div>
      </div>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div class="flash-message flash-{{ category }}">{{ message }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <!-- Login form -->
      <form class="login-form" method="POST" action="{{ url_for('manage.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">

        <div class="form-group">
          <label for="username">用戶名稱</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined">person</span>
            <input type="text" id="username" name="username" placeholder="請輸入用戶名稱" required autocomplete="username" autofocus>
          </div>
        </div>

        <div class="form-group">
          <label for="password">密碼</label>
          <div class="input-wrapper">
            <span class="material-symbols-outlined">lock</span>
            <input type="password" id="password" name="password" placeholder="請輸入密碼" required autocomplete="current-password">
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" name="remember" value="1">
            <span>記住我</span>
          </label>
          <a href="#" class="forgot-link">忘記密碼？</a>
        </div>

        <button type="submit" class="btn-login">
          <span class="material-symbols-outlined">login</span>
          登入系統
        </button>
      </form>

      <div class="login-footer">
        &copy; 寶榮堂花炮會 &middot; 版權所有
      </div>
    </div>

  </div>
</body>
</html>
